services:
  # ── Infrastructure ──────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: degen-postgres
    environment:
      POSTGRES_DB: degen
      POSTGRES_USER: degen
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U degen"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - degen

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: degen-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: degen
      RABBITMQ_DEFAULT_PASS: devpassword
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - degen

  # ── Application Services ────────────────────────────────
  api-core:
    build:
      context: ../../apps/api-core
      dockerfile: Dockerfile
    container_name: degen-api-core
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=degen;Username=degen;Password=devpassword"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: degen
      RabbitMQ__Password: devpassword
      Services__MarketData: "http://worker-market:8080"
      Services__Execution: "http://svc-execution:8080"
      Services__Analytics: "http://svc-analytics:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - degen

volumes:
  pgdata:
  rabbitdata:

networks:
  degen:
    driver: bridge
