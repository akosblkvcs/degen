version: "0.5"
ordered_shutdown: true

log_configuration:
  disable_json: true
  add_timestamp: true
  timestamp_format: "06-01-02 15:04:05.000"
  no_color: true
  flush_each_line: true

processes:
  postgres:
    disabled: false
    command: docker compose up postgres
    ready_log_line: "database system is ready to accept connections"
    log_location: ./logs/postgres.log
    shutdown:
      command: docker compose down postgres -t 30

  api:
    disabled: false
    working_dir: ./api
    command: dotnet watch --project src/Degen.Api
    ready_log_line: "Now listening on"
    log_location: ./logs/api.log
    shutdown:
      signal: 2
      timeout_seconds: 15
    availability:
      restart: on_failure
      max_restarts: 3
    depends_on:
      postgres:
        condition: process_log_ready

  web:
    disabled: false
    working_dir: ./web
    command: pnpm start
    ready_log_line: "Local:"
    log_location: ./logs/web.log
    depends_on:
      api:
        condition: process_log_ready
