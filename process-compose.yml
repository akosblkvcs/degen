version: "0.5"

log_configuration:
  disable_json: true
  add_timestamp: true
  timestamp_format: "06-01-02 15:04:05.000"
  no_color: true
  flush_each_line: true

processes:
  postgres:
    command: docker compose up postgres
    ready_log_line: "database system is ready to accept connections"
    log_location: ./logs/postgres.log
    shutdown:
      command: docker compose down postgres -t 30

  rabbitmq:
    command: docker compose up rabbitmq
    ready_log_line: "Server startup complete"
    log_location: ./logs/rabbitmq.log
    depends_on:
      postgres:
        condition: process_started
    shutdown:
      command: docker compose down rabbitmq -t 30

  api:
    working_dir: ./apps/api-core/src/Degen.Api
    command: dotnet run
    log_location: ./logs/api.log
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 5000
        path: /healthz
      initial_delay_seconds: 5
      period_seconds: 10
      timeout_seconds: 2
      failure_threshold: 5
    depends_on:
      postgres:
        condition: process_log_ready
      rabbitmq:
        condition: process_log_ready

  worker:
    working_dir: ./apps/worker-market/src/Degen.Worker.Market
    command: dotnet run
    ready_log_line: "RabbitMQ publisher initialized"
    log_location: ./logs/worker.log
    depends_on:
      postgres:
        condition: process_log_ready
      rabbitmq:
        condition: process_log_ready

  web:
    working_dir: ./apps/web-angular
    command: pnpm start
    ready_log_line: "Local:   http://localhost:4200/"
    log_location: ./logs/web.log
    depends_on:
      api:
        condition: process_healthy
      worker:
        condition: process_log_ready
